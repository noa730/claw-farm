<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
  </defs>

  <!-- Cycle ring -->
  <circle cx="150" cy="140" r="90" fill="none" stroke="#66bb6a" stroke-width="2" stroke-dasharray="8 5" opacity="0.3"/>

  <!-- 4 cycle nodes -->
  <circle cx="150" cy="50" r="7" fill="#a1887f"/>
  <circle cx="240" cy="140" r="7" fill="#ffa726"/>
  <circle cx="150" cy="230" r="7" fill="#8d6e63"/>
  <circle cx="60" cy="140" r="7" fill="#aed581"/>

  <!-- Connecting arcs -->
  <path d="M 157 52 A 90 90 0 0 1 238 133" fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.35"/>
  <path d="M 238 147 A 90 90 0 0 1 157 228" fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.35"/>
  <path d="M 143 228 A 90 90 0 0 1 62 147" fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.35"/>
  <path d="M 62 133 A 90 90 0 0 1 143 52" fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.35"/>

  <!-- Center: Claw-leaf icon -->
  <ellipse cx="150" cy="148" rx="22" ry="18" fill="url(#claw)" opacity="0.85"/>

  <!-- 3 leaf-fingers -->
  <path d="M 140 138 Q 122 105 133 88 Q 138 100 143 118 Q 140 126 140 138 Z" fill="url(#claw)" opacity="0.9"/>
  <path d="M 147 132 Q 148 95 155 78 Q 158 95 158 115 Q 155 124 147 132 Z" fill="url(#claw)" opacity="0.95"/>
  <path d="M 160 138 Q 178 105 167 88 Q 162 100 157 118 Q 160 126 160 138 Z" fill="url(#claw)" opacity="0.9"/>

  <!-- AI circuit dots -->
  <circle cx="145" cy="146" r="1.5" fill="#e8f5e9" opacity="0.8"/>
  <circle cx="155" cy="146" r="1.5" fill="#e8f5e9" opacity="0.8"/>
  <circle cx="150" cy="154" r="1.5" fill="#e8f5e9" opacity="0.8"/>
  <line x1="145" y1="146" x2="150" y2="154" stroke="#e8f5e9" stroke-width="0.6" opacity="0.5"/>
  <line x1="155" y1="146" x2="150" y2="154" stroke="#e8f5e9" stroke-width="0.6" opacity="0.5"/>
  <line x1="145" y1="146" x2="155" y2="146" stroke="#e8f5e9" stroke-width="0.6" opacity="0.5"/>

  <!-- Text -->
  <text x="150" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#81c784" font-weight="700" letter-spacing="3">CLAW FARM</text>
  <text x="150" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9e9e9e" letter-spacing="3">CIRCULAR AGRICULTURE</text>
</svg>
